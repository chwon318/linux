{% extends 'dearday/base.html' %}

{% block title %}대화 삭제{% endblock %}

{% block content %}
<section class="confirm-panel">
    <p class="eyebrow">Delete</p>
    <h1>이 하루 대화를 삭제할까요?</h1>
    <p>"{{ conversation.title }}" 대화와 생성된 일기가 함께 삭제됩니다.</p>
    <form method="post">
        {% csrf_token %}
        <button class="button danger" type="submit">삭제</button>
        <a class="button secondary" href="{% url 'conversation_detail' conversation.pk %}">취소</a>
    </form>
</section>
{% endblock %}
